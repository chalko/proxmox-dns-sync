apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: pihole-secrets
  namespace: external-dns
spec:
  refreshInterval: "1h"
  secretStoreRef:
    name: vault-backend
    kind: ClusterSecretStore
  target:
    name: pihole-secrets
    creationPolicy: Owner
  data:
    - secretKey: password
      remoteRef:
        key: secret/data/app/pihole
        property: password
